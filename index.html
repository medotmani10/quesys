<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <meta name="description" content="نظام إدارة صالونات الحلاقة الذكي" />
  <meta name="theme-color" content="#09090b" />
  <link id="app-icon" rel="icon" type="image/svg+xml" href="/customer-icon.svg" />
  <link id="app-apple-icon" rel="apple-touch-icon" href="/customer-icon.svg">
  <title id="app-title">Mon Coiffure — نظام إدارة صالونات الحلاقة</title>

  <!-- Dynamic Barber PWA Injection -->
  <script>
    if (window.location.hostname.includes('barber-') || window.location.hostname.includes('barber.')) {
      document.getElementById('app-icon').href = '/barber-app-icon.svg';
      document.getElementById('app-apple-icon').href = '/barber-app-icon.svg';
      document.getElementById('app-title').textContent = 'Barber App';

      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = '/barber-manifest.json';
      document.head.appendChild(manifestLink);
    } else if (window.location.hostname.includes('admin')) {
      document.getElementById('app-icon').href = '/pwa-icon.svg';
      document.getElementById('app-apple-icon').href = '/pwa-icon.svg';
      document.getElementById('app-title').textContent = 'Mon Coiffure — الإدارة';
    } else {
      // The default VitePWA plugin will inject the default manifest automatically.
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
