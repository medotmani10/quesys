<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .bg { fill: #09090b; }
      .skin { fill: #ffbba5; }
      .hair { fill: #1f2937; }
      .shirt { fill: #facc15; }
      .scissors { fill: #9ca3af; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="512" height="512" rx="100" />
  
  <!-- Stylized Barber Figure -->
  <g transform="translate(156, 120)">
    <!-- Shoulders/Shirt -->
    <path class="shirt" d="M20 280 C20 220, 180 220, 180 280 L180 320 L20 320 Z" />
    <!-- Neck -->
    <rect class="skin" x="80" y="140" width="40" height="40" rx="10" />
    <!-- Head -->
    <circle class="skin" cx="100" cy="100" r="50" />
    <path class="skin" d="M70 120 Q100 170 130 120 Z" /> <!-- Beard shape -->
    <!-- Hair & Beard (dark) -->
    <path class="hair" d="M50 80 C40 30, 160 30, 150 80 C150 120, 130 160, 100 160 C70 160, 50 120, 50 80 Z" />
    <circle class="skin" cx="100" cy="100" r="40" /> <!-- Inner face -->
    <!-- Eyes -->
    <circle cx="85" cy="90" r="5" fill="#000" />
    <circle cx="115" cy="90" r="5" fill="#000" />
    <!-- Mustache -->
    <path class="hair" d="M75 110 Q100 100 125 110 Q100 125 75 110 Z" />
  </g>
  
  <!-- Scissors Icon Element overlay -->
  <g transform="translate(260, 260) rotate(-45)">
    <path class="scissors" d="M50 0 L55 -40 L65 -40 L60 0 Z" />
    <path class="scissors" d="M30 0 L25 -40 L15 -40 L20 0 Z" />
    <circle cx="20" cy="10" r="10" fill="none" stroke="#9ca3af" stroke-width="6" />
    <circle cx="60" cy="10" r="10" fill="none" stroke="#9ca3af" stroke-width="6" />
    <circle cx="40" cy="-20" r="4" fill="#6b7280" />
  </g>
</svg>
