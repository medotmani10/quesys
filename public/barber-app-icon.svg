<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A" />
      <stop offset="30%" stop-color="#FACC15" />
      <stop offset="70%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#A16207" />
    </linearGradient>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#27272A" />
      <stop offset="100%" stop-color="#09090B" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.8" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Dark Premium Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

  <!-- Glowing Outer Rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldBrand)" stroke-width="4" opacity="0.4" filter="url(#glow)" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#goldBrand)" stroke-width="2" opacity="0.15" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#goldBrand)" stroke-width="1" opacity="0.05" />

  <!-- The Golden Scissors -->
  <g transform="translate(64, 64) scale(16)" fill="none" stroke="url(#goldBrand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <circle cx="6" cy="6" r="3" />
    <circle cx="6" cy="18" r="3" />
    <line x1="20" y1="4" x2="8.12" y2="15.88" />
    <line x1="14.47" y1="14.48" x2="20" y2="20" />
    <line x1="8.12" y1="8.12" x2="12" y2="12" />
  </g>
  
  <!-- Subtle center pivot dot -->
  <circle cx="256" cy="256" r="8" fill="#18181B" filter="url(#shadow)" />
  <circle cx="256" cy="256" r="6" fill="url(#goldBrand)" opacity="0.5" />
</svg>
