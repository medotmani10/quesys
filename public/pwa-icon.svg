<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="40%"  stop-color="#facc15"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#2d2d32"/>
      <stop offset="100%" stop-color="#09090B"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.15"/>

  <!-- ── TICKET body ── -->
  <g filter="url(#glow)">
    <rect x="96" y="176" width="320" height="160" rx="22" ry="22"
          fill="none" stroke="url(#goldGrad)" stroke-width="8"/>
    <!-- Notch cut-outs -->
    <circle cx="96"  cy="256" r="24" fill="#09090B"/>
    <circle cx="416" cy="256" r="24" fill="#09090B"/>
    <!-- Dashed mid-line -->
    <line x1="122" y1="256" x2="390" y2="256"
          stroke="url(#goldGrad)" stroke-width="3.5" stroke-dasharray="14 10" opacity="0.45"/>
  </g>

  <!-- Ticket text label -->
  <text x="256" y="242"
        text-anchor="middle" font-family="'Arial Black', sans-serif"
        font-size="44" font-weight="900" letter-spacing="4"
        fill="url(#goldGrad)" filter="url(#glow)">TICKET</text>
  <text x="256" y="294"
        text-anchor="middle" font-family="monospace"
        font-size="20" font-weight="600" letter-spacing="6"
        fill="url(#goldGrad)" opacity="0.55">✦  ADMIN  ✦</text>

  <!-- ── SCISSORS (golden, crossing the ticket corner) ── -->
  <!-- Blade 1 -->
  <g filter="url(#glow)" stroke="url(#goldGrad)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Upper blade -->
    <line x1="310" y1="143" x2="168" y2="200" stroke-width="11"/>
    <!-- Lower blade -->
    <line x1="310" y1="369" x2="168" y2="312" stroke-width="11"/>
    <!-- Pivot ring -->
    <circle cx="168" cy="256" r="28" stroke-width="10"/>
    <circle cx="168" cy="256" r="10" fill="url(#goldGrad)" stroke="none"/>
  </g>

  <!-- Corner sparkles -->
  <path d="M378 144 Q387 144 387 135 Q387 144 396 144 Q387 144 387 153 Q387 144 378 144 Z"
        fill="url(#goldGrad)" opacity="0.9"/>
  <path d="M138 366 Q143 366 143 361 Q143 366 148 366 Q143 366 143 371 Q143 366 138 366 Z"
        fill="url(#goldGrad)" opacity="0.7"/>
</svg>
